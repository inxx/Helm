<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Helm</title>
    <link rel="stylesheet" href="/assets/app.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="rail">
        <div class="brand">
          <span class="brand-mark">H</span>
          <div>
            <strong>Helm</strong>
            <span>local agent ops</span>
          </div>
        </div>

        <nav class="view-nav" aria-label="session filters">
          <button class="view-item active" type="button" data-view="all">
            <span>All</span>
            <strong id="nav-all">0</strong>
          </button>
          <button class="view-item" type="button" data-view="review">
            <span>Review</span>
            <strong id="nav-review">0</strong>
          </button>
          <button class="view-item" type="button" data-view="ship">
            <span>Ship</span>
            <strong id="nav-ship">0</strong>
          </button>
          <button class="view-item" type="button" data-view="repair">
            <span>Repair</span>
            <strong id="nav-repair">0</strong>
          </button>
        </nav>

        <section class="rail-section" aria-label="repository">
          <h2>Repo</h2>
          <dl class="repo-facts">
            <div>
              <dt>branch</dt>
              <dd id="repo-branch">-</dd>
            </div>
            <div>
              <dt>head</dt>
              <dd id="repo-head">-</dd>
            </div>
            <div>
              <dt>state</dt>
              <dd id="repo-state">-</dd>
            </div>
          </dl>
        </section>
      </aside>

      <main class="workspace">
        <header class="hero-bar">
          <div class="hero-copy">
            <p class="eyebrow">control room</p>
            <h1>Helm</h1>
            <p id="repo-path" class="repo-path">-</p>
          </div>
          <button id="refresh-button" class="icon-button" type="button" title="새로고침" aria-label="새로고침">
            ↻
          </button>
        </header>

        <section class="workflow-strip" id="workflow-strip" aria-label="workflow"></section>

        <section class="summary-band" aria-label="summary">
          <div class="signal large">
            <span>workspace</span>
            <strong id="metric-dirty">0</strong>
          </div>
          <div class="signal">
            <span>sessions</span>
            <strong id="metric-sessions">0</strong>
          </div>
          <div class="signal">
            <span>review</span>
            <strong id="metric-review">0</strong>
          </div>
          <div class="signal">
            <span>ship</span>
            <strong id="metric-ship">0</strong>
          </div>
          <div class="signal">
            <span>prs</span>
            <strong id="metric-prs">0</strong>
          </div>
        </section>

        <section class="ops-layout">
          <section class="session-column" aria-label="sessions">
            <div class="section-head">
              <div>
                <p class="eyebrow">sessions</p>
                <h2>Agent Runs</h2>
              </div>
              <input id="session-filter" type="search" placeholder="검색" aria-label="세션 검색" />
            </div>
            <div id="session-list" class="session-list" aria-live="polite"></div>
          </section>

          <aside class="inspect-column" aria-label="inspection">
            <section class="workspace-panel">
              <div class="section-head compact">
                <div>
                  <p class="eyebrow">workspace</p>
                  <h2>Git State</h2>
                </div>
                <span id="captured-at" class="stamp">-</span>
              </div>
              <div id="status-list" class="status-list"></div>
            </section>

            <section class="detail-panel">
              <div class="section-head compact">
                <div>
                  <p class="eyebrow">selected</p>
                  <h2>Session</h2>
                </div>
                <div class="artifact-tabs" role="tablist" aria-label="artifact preview">
                  <button class="artifact-tab active" type="button" data-artifact="log">Log</button>
                  <button class="artifact-tab" type="button" data-artifact="diff">Diff</button>
                </div>
              </div>
              <div id="session-detail" class="detail-empty">-</div>
            </section>
          </aside>
        </section>
      </main>
    </div>

    <script src="/assets/app.js" type="module"></script>
  </body>
</html>
